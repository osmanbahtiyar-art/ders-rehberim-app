    <!-- GitHub Pages SPA yönlendirme (custom domain) -->
    <script>
      (function(){
        var query = window.location.search;
        if (query.slice(1,3) === 'p=') {
          var path = query.slice(3).replace(/~and~/g, '&');
          var search = '';
          var idx = path.indexOf('&q=');
          if (idx !== -1) {
            search = '?' + path.slice(idx + 3).replace(/~and~/g, '&');
            path = path.slice(0, idx);
          }
          window.history.replaceState(null, null, '/' + path + search + window.location.hash);
        }
      })();
    </script>
