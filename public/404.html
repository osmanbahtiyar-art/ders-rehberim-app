<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Özel Ders Rehberim</title>
    <script>
      // GitHub Pages SPA — Custom domain için tüm path'leri index.html'e yönlendir
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.host + '/?p=' +
        l.pathname.slice(1).replace(/&/g, '~and~') +
        (l.search ? '&q=' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
</html>
